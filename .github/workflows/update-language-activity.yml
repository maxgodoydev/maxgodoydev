name: Atualizar linguagens dos projetos

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * 0"

permissions:
  contents: write

concurrency:
  group: update-project-language-stats
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Executar testes
        run: python -m unittest discover -s tests -v

      - name: Gerar percentuais das linguagens
        env:
          GH_TOKEN: ${{ secrets.PROFILE_TOKEN || github.token }}
          GITHUB_USER: maxgodoydev
          TOP_LANGUAGES: "6"
        run: python scripts/update_language_stats.py

      - name: Publicar arquivos atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/generated

          if git diff --cached --quiet; then
            echo "Nenhuma alteração encontrada."
            exit 0
          fi

          git commit -m "chore: atualiza linguagens dos projetos"
          git push origin HEAD:main
