name: Atualizar Breakout de contribuições

on:
  schedule:
    - cron: "15 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-breakout:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Gerar os SVGs do Breakout
        uses: cyprieng/github-breakout@v1.2.4
        with:
          github_username: ${{ github.repository_owner }}
          enable_ghost_bricks: true

      - name: Preparar os arquivos gerados
        run: |
          mkdir -p /tmp/breakout-images
          mv output/light.svg /tmp/breakout-images/breakout-light.svg
          mv output/dark.svg /tmp/breakout-images/breakout-dark.svg

      - name: Configurar o Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Publicar os SVGs na branch github-breakout
        run: |
          git checkout --orphan github-breakout
          git rm -rf .
          mkdir -p images
          mv /tmp/breakout-images/* images/
          git add images
          git commit -m "chore: atualizar Breakout de contribuições" || echo "Sem alterações para publicar"
          git push --force origin github-breakout
