name: Atualizar cards de estatísticas do GitHub

on:
  schedule:
    - cron: "0 6 * * *"  # todo dia às 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats-cards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Gerar card de estatísticas
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=maxgodoydev&show_icons=true&theme=tokyonight&hide_border=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Gerar card de linguagens mais usadas
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=maxgodoydev&theme=tokyonight&hide_border=true&langs_count=6
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commitar cards atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/stats.svg profile/top-langs.svg
          git commit -m "chore: atualiza cards de estatísticas do GitHub" || exit 0
          git push
