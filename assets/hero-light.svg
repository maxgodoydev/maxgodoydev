<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="500" viewBox="0 0 1280 500" role="img" aria-labelledby="title desc">
<title id="title">Max Godoy — Dados, Analytics e BI, Automação de Processos</title>
<desc id="desc">Cabeçalho de perfil com painel de dados: KPIs, gráfico de barras, gráfico de rosca e pipeline de dados.</desc>
<defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EFE9DE"/>
      <stop offset="100%" stop-color="#F8F4EC"/>
    </linearGradient>
    <linearGradient id="nameGold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E9D9B8"/>
      <stop offset="50%" stop-color="#F0C96A"/>
      <stop offset="100%" stop-color="#CCB587"/>
    </linearGradient>
    <pattern id="grid" width="38" height="38" patternUnits="userSpaceOnUse">
      <path d="M38 0H0V38" fill="none" stroke="#D7CEC0" stroke-width="1" opacity=".28"/>
    </pattern>
    <filter id="softShadow" x="-30%" y="-30%" width="180%" height="190%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity=".22"/>
    </filter>
    <filter id="cardShadow" x="-30%" y="-30%" width="180%" height="190%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity=".22"/>
    </filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      text{font-family:Arial,Helvetica,sans-serif}
      .badgePulse{animation:badge 2.6s ease-in-out infinite}
      @keyframes badge{0%,100%{opacity:.45}50%{opacity:1}}
      .barGrow{transform-box:fill-box;transform-origin:bottom;animation:grow 2.4s ease-out infinite alternate}
      @keyframes grow{from{transform:scaleY(.55)}to{transform:scaleY(1)}}
      .sweep{stroke-dasharray:340;stroke-dashoffset:340;animation:sweep 3.2s ease-in-out infinite}
      @keyframes sweep{0%{stroke-dashoffset:340}55%{stroke-dashoffset:0}100%{stroke-dashoffset:0}}
    </style>
  </defs>
